<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Leads | CSK</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0C0B07;
            --bg-card: #14120F;
            --border: rgba(184, 134, 90, 0.15);
            --bronze: #B8865A;
            --bronze-lt: #D4A87C;
            --cream: #F0EAE0;
            --white: #FFFFFF;
            --font-s: 'Cormorant Garamond', Georgia, serif;
            --font-n: 'Inter', system-ui, sans-serif;
            --ease: cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        body {
            background: var(--bg);
            color: var(--cream);
            font-family: var(--font-n);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            opacity: 0;
            transition: opacity 0.5s;
        }

        body.auth-checked {
            opacity: 1;
        }

        header {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            background: rgba(12, 11, 7, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo img {
            height: 30px;
        }

        .logo-text {
            font-family: var(--font-s);
            font-size: 0.9rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        .user-actions {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logout-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--cream);
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: 0.3s;
        }

        .logout-btn:hover {
            border-color: var(--bronze);
            color: var(--bronze);
        }

        main {
            flex: 1;
            padding: 40px;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 40px;
        }

        h1 {
            font-family: var(--font-s);
            font-size: 2.5rem;
            font-weight: 300;
            margin: 0;
            color: var(--white);
        }

        .stats {
            display: flex;
            gap: 40px;
        }

        .stat-item span {
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #8C7D6A;
            margin-bottom: 4px;
        }

        .stat-item strong {
            font-size: 1.5rem;
            color: var(--bronze);
        }

        .controls {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
        }

        .export-btn {
            background: var(--bronze);
            color: var(--bg);
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
        }

        .export-btn:hover {
            background: var(--bronze-lt);
            transform: translateY(-2px);
        }

        .table-container {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        th {
            text-align: left;
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            color: var(--bronze);
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            background: rgba(184, 134, 90, 0.05);
        }

        td {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            color: #D1C9BC;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: rgba(184, 134, 90, 0.03);
        }

        .loading-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(184, 134, 90, 0.1);
            border-top-color: var(--bronze);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .no-data {
            padding: 40px;
            text-align: center;
            color: #8C7D6A;
        }
    </style>
</head>
<body>
    <div id="loader" class="loading-overlay">
        <div class="spinner"></div>
    </div>

    <header>
        <div class="logo">
            <img src="https://zinrqzsxvpqfoogohrwg.supabase.co/storage/v1/object/public/CSK/01_Simbolo_Cor_Claro_1%20copiar.png" alt="CSK">
            <span class="logo-text">Caroline Sautchuk</span>
        </div>
        <div class="user-actions">
            <span id="user-email" style="font-size: 0.8rem; opacity: 0.6"></span>
            <button class="logout-btn" id="logout-btn">Sair</button>
        </div>
    </header>

    <main>
        <div class="dashboard-header">
            <div>
                <h1>Gestão de Leads</h1>
                <p style="color: #8C7D6A; margin: 8px 0 0">Visualize e exporte os inscritos da palestra.</p>
            </div>
            <div class="stats">
                <div class="stat-item">
                    <span>Total de Leads</span>
                    <strong id="total-count">0</strong>
                </div>
            </div>
        </div>

        <div class="controls">
            <button class="export-btn" id="export-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                Exportar CSV
            </button>
        </div>

        <div class="table-container">
            <table id="leads-table">
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>WhatsApp</th>
                        <th>Instagram</th>
                        <th>Profissão</th>
                        <th>Faturamento</th>
                        <th>Data</th>
                    </tr>
                </thead>
                <tbody id="leads-body">
                    <!-- Leads will be injected here -->
                </tbody>
            </table>
            <div id="no-data-msg" class="no-data" style="display: none;">Nenhum lead encontrado.</div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://zinrqzsxvpqfoogohrwg.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InppbnJxenN4dnBxZm9vZ29ocndnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjAzMDk1MDIsImV4cCI6MjA3NTg4NTUwMn0.0VDP-0ys8Y_VUhLXNCJCcSV1xAXV4c6pBvUq4mjPsRU';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function checkAuth() {
            console.log("Iniciando checkAuth...");
            try {
                const { data: { session }, error } = await supabase.auth.getSession();
                
                if (error) {
                    console.error("Erro ao buscar sessão:", error);
                    throw error;
                }

                console.log("Sessão encontrada:", !!session);

                if (!session) {
                    console.warn("Sem sessão ativa. Redirecionando para login...");
                    window.location.href = '/login';
                    return;
                }

                console.log("Usuário logado:", session.user.email);
                document.body.classList.add('auth-checked');
                document.getElementById('loader').style.display = 'none';
                document.getElementById('user-email').innerText = session.user.email;
                loadLeads();
            } catch (err) {
                console.error("Falha crítica no checkAuth:", err);
                // Forçar redirecionamento se falhar
                window.location.href = '/login';
            }
        }

        async function loadLeads() {
            const { data: { session } } = await supabase.auth.getSession();
            
            try {
                const response = await fetch('/api/admin/leads', {
                    headers: {
                        'Authorization': `Bearer ${session.access_token}`
                    }
                });

                if (!response.ok) throw new Error('Acesso negado');

                const leads = await response.json();
                renderLeads(leads);
            } catch (err) {
                console.error(err);
                alert('Erro ao carregar leads. Verifique se você tem permissão.');
            }
        }

        function renderLeads(leads) {
            const body = document.getElementById('leads-body');
            const total = document.getElementById('total-count');
            const noData = document.getElementById('no-data-msg');
            
            body.innerHTML = '';
            total.innerText = leads.length;

            if (leads.length === 0) {
                noData.style.display = 'block';
                return;
            }

            noData.style.display = 'none';
            leads.forEach(lead => {
                const row = document.createElement('tr');
                const date = new Date(lead.criado_em).toLocaleDateString('pt-BR');
                row.innerHTML = `
                    <td>${lead.nome}</td>
                    <td>${lead.telefone}</td>
                    <td>${lead.instagram}</td>
                    <td>${lead.profissao}</td>
                    <td>${lead.faturamento_empresa}</td>
                    <td style="font-size: 0.8rem; opacity: 0.6">${date}</td>
                `;
                body.appendChild(row);
            });
        }

        document.getElementById('logout-btn').addEventListener('click', async () => {
            await supabase.auth.signOut();
            window.location.href = '/login';
        });

        document.getElementById('export-btn').addEventListener('click', async () => {
            const { data: { session } } = await supabase.auth.getSession();
            
            window.location.href = `/api/admin/export?token=${session.access_token}`;
        });

        checkAuth();
    </script>
</body>
</html>
